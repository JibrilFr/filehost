services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://filehost:filehost_internal_db_pass@db:5432/filehost
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_CUSTOM_DOMAIN=${R2_CUSTOM_DOMAIN}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # No public ports — reverse proxy (Dokploy/Traefik) handles HTTPS

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=filehost
      - POSTGRES_PASSWORD=filehost_internal_db_pass
      - POSTGRES_DB=filehost
    volumes:
      - filehost_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filehost"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  filehost_db_data:
